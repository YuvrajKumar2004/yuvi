<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${editMode} ? 'Edit Post' : 'New Post'">Post | NITA Placement</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
        <a th:href="@{/coordinator/dashboard}" class="text-gray-500 hover:text-gray-700 text-sm">&larr; Back</a>
        <span class="text-gray-300">|</span>
        <span class="text-sm font-medium text-gray-700" th:text="${editMode} ? 'Edit placement drive' : 'New placement drive'"></span>
    </div>
    <form th:action="@{/logout}" method="post" class="inline">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="text-gray-500 hover:text-red-600 text-xs border border-gray-200 px-3 py-1 rounded">Logout</button>
    </form>
</nav>

<div class="max-w-3xl mx-auto px-4 py-8">
<!--    <form th:action="${editMode} ? @{/coordinator/posts/{id}/update(id=${opportunity.id})} : @{/coordinator/posts}"-->
<!--          method="post" class="space-y-8">-->
    <form th:action="${editMode} ? '/coordinator/posts/' + ${opportunity.id} + '/update' : '/coordinator/posts'"
          method="post" class="space-y-8">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="bg-white rounded-xl border border-gray-200 p-6">
            <h2 class="text-sm font-semibold text-gray-700 mb-5">Drive details</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Category</label>
                    <select name="category" required class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="ON_CAMPUS" th:selected="${opportunity.category != null and opportunity.category.name() == 'ON_CAMPUS'}">On-campus</option>
                        <option value="OFF_CAMPUS" th:selected="${opportunity.category != null and opportunity.category.name() == 'OFF_CAMPUS'}">Off-campus</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Tier</label>
                    <select name="tier" required class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="DREAM" th:selected="${opportunity.tier != null and opportunity.tier.name() == 'DREAM'}">Dream</option>
                        <option value="STANDARD" th:selected="${opportunity.tier != null and opportunity.tier.name() == 'STANDARD'}">Standard</option>
                        <option value="NORMAL" th:selected="${opportunity.tier != null and opportunity.tier.name() == 'NORMAL'}">Normal</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Company name</label>
                    <input type="text" name="companyName" required th:value="${opportunity.companyName}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Job role</label>
                    <input type="text" name="jobRole" required th:value="${opportunity.jobRole}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Stipend / CTC</label>
                    <input type="text" name="stipendCtc" th:value="${opportunity.stipendCtc}" placeholder="e.g. 12 LPA" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Application deadline</label>
                    <input type="date" name="deadlineStr" th:value="${deadlineValue}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-medium text-gray-600 mb-1">Skills required</label>
                    <input type="text" name="skills" th:value="${opportunity.skills}" placeholder="e.g. Java, SQL, DSA" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-xs font-medium text-gray-600 mb-1">Other details</label>
                    <textarea name="otherDetails" rows="3" th:text="${opportunity.otherDetails}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl border border-gray-200 p-6">
            <h2 class="text-sm font-semibold text-gray-700 mb-1">Eligibility criteria</h2>
            <p class="text-xs text-gray-400 mb-5">Leave blank to skip a check. Branch: comma-separated (e.g. CSE,ECE,EE).</p>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Enrollment prefix</label>
                    <input type="text" name="eligibilityEnrollmentPrefix" th:value="${opportunity.eligibilityEnrollmentPrefix}" placeholder="e.g. 23" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Min X %</label>
                    <input type="number" step="0.01" name="eligibilityXPercentage" th:value="${opportunity.eligibilityXPercentage}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Min XII %</label>
                    <input type="number" step="0.01" name="getEligibilityXiiPercentage" th:value="${eligibilityXiiValue}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Min CGPA</label>
                    <input type="number" step="0.01" name="eligibilityCgpa" th:value="${opportunity.eligibilityCgpa}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Max active backlogs</label>
                    <input type="number" name="eligibilityActiveBacklogs" th:value="${opportunity.eligibilityActiveBacklogs}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Max dead backlogs</label>
                    <input type="number" name="eligibilityDeadBacklogs" th:value="${opportunity.eligibilityDeadBacklogs}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Branches (CSV)</label>
                    <input type="text" name="eligibleBranch" th:value="${opportunity.eligibleBranch}" placeholder="CSE,ECE,EE" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-600 mb-1">Max gap years</label>
                    <input type="number" name="eligibilityMaxGapYears" th:value="${opportunity.eligibilityMaxGapYears}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl border border-gray-200 p-6">
            <h2 class="text-sm font-semibold text-gray-700 mb-1">Student data to share with company</h2>
            <p class="text-xs text-gray-400 mb-4">Selected fields will appear in applications view and CSV export.</p>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" name="sharedFields" value="email" th:checked="${#lists.contains(selectedSharedFields, 'email')}" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"/>
                    <span class="text-gray-600 text-xs">email</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" name="sharedFields" value="mobile" th:checked="${#lists.contains(selectedSharedFields, 'mobile')}" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"/>
                    <span class="text-gray-600 text-xs">mobile</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" name="sharedFields" value="branch" th:checked="${#lists.contains(selectedSharedFields, 'branch')}" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"/>
                    <span class="text-gray-600 text-xs">branch</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" name="sharedFields" value="cgpa" th:checked="${#lists.contains(selectedSharedFields, 'cgpa')}" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"/>
                    <span class="text-gray-600 text-xs">cgpa</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" name="sharedFields" value="xPercentage" th:checked="${#lists.contains(selectedSharedFields, 'xPercentage')}" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"/>
                    <span class="text-gray-600 text-xs">xPercentage</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" name="sharedFields" value="xiiPercentage" th:checked="${#lists.contains(selectedSharedFields, 'xiiPercentage')}" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"/>
                    <span class="text-gray-600 text-xs">xiiPercentage</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" name="sharedFields" value="activeBacklogs" th:checked="${#lists.contains(selectedSharedFields, 'activeBacklogs')}" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"/>
                    <span class="text-gray-600 text-xs">activeBacklogs</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" name="sharedFields" value="deadBacklogs" th:checked="${#lists.contains(selectedSharedFields, 'deadBacklogs')}" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"/>
                    <span class="text-gray-600 text-xs">deadBacklogs</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" name="sharedFields" value="cv1Url" th:checked="${#lists.contains(selectedSharedFields, 'cv1Url')}" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"/>
                    <span class="text-gray-600 text-xs">cv1Url</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" name="sharedFields" value="cv2Url" th:checked="${#lists.contains(selectedSharedFields, 'cv2Url')}" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"/>
                    <span class="text-gray-600 text-xs">cv2Url</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" name="sharedFields" value="cv3Url" th:checked="${#lists.contains(selectedSharedFields, 'cv3Url')}" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500"/>
                    <span class="text-gray-600 text-xs">cv3Url</span>
                </label>
            </div>
        </div>

        <div class="flex gap-3 justify-end">
            <a th:href="@{/coordinator/dashboard}" class="border border-gray-200 text-gray-600 px-5 py-2 rounded-lg text-sm hover:bg-gray-50">Cancel</a>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-6 py-2 rounded-lg text-sm transition" th:text="${editMode} ? 'Update post' : 'Create post'"></button>
        </div>
    </form>
</div>
</body>
</html>
