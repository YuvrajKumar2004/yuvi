<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Coordinator Dashboard | NITA Placement</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Navbar -->
<nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
        <span class="text-blue-700 font-bold text-lg">NITA</span>
        <span class="text-gray-500 text-sm">Placement Portal</span>
    </div>
    <div class="flex items-center gap-3 text-sm">
        <span class="bg-green-50 text-green-700 px-2 py-1 rounded text-xs font-medium">Coordinator</span>
        <form th:action="@{/logout}" method="post" class="inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="text-gray-500 hover:text-red-600 text-xs border border-gray-200 px-3 py-1 rounded">Logout</button>
        </form>
    </div>
</nav>

<div class="max-w-6xl mx-auto px-4 py-6">

    <div th:if="${success}" class="bg-green-50 border border-green-200 text-green-800 text-sm rounded px-4 py-3 mb-4" th:text="${success}"></div>
    <div th:if="${error}"   class="bg-red-50 border border-red-200 text-red-800 text-sm rounded px-4 py-3 mb-4"   th:text="${error}"></div>

    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-lg font-semibold text-gray-800">My placement drives</h1>
        <a th:href="@{/coordinator/new-post}"
           class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition">
            + New post
        </a>
    </div>

    <!-- Empty state -->
    <div th:if="${posts.isEmpty()}" class="bg-white rounded-xl border border-gray-200 p-12 text-center">
        <p class="text-gray-400 text-sm mb-4">No placement drives posted yet.</p>
        <a th:href="@{/coordinator/new-post}"
           class="bg-blue-600 text-white text-sm px-4 py-2 rounded-lg">Create your first post</a>
    </div>

    <!-- Posts list -->
    <div class="space-y-4">
        <div th:each="post : ${posts}"
             class="bg-white rounded-xl border border-gray-200 p-5">
            <div class="flex items-start justify-between mb-3">
                <div>
                    <div class="font-semibold text-gray-800" th:text="${post.companyName}"></div>
                    <div class="text-sm text-gray-500 mt-0.5" th:text="${post.jobRole}"></div>
                </div>
                <div class="flex items-center gap-2 flex-wrap justify-end">
          <span th:text="${post.category}"
                th:classappend="${post.category.name() == 'ON_CAMPUS'} ? 'bg-blue-50 text-blue-700' : 'bg-amber-50 text-amber-700'"
                class="text-xs px-2 py-0.5 rounded-full font-medium"></span>
                    <span th:text="${post.tier}"
                          th:classappend="${post.tier.name() == 'DREAM'} ? 'bg-purple-100 text-purple-700' :
                                (${post.tier.name() == 'STANDARD'} ? 'bg-blue-100 text-blue-700' : 'bg-green-100 text-green-700')"
                          class="text-xs px-2 py-0.5 rounded-full font-medium"></span>
                </div>
            </div>

            <div class="text-xs text-gray-400 mb-4 grid grid-cols-3 gap-2">
                <span th:if="${post.stipendCtc}">CTC: <span class="text-gray-600" th:text="${post.stipendCtc}"></span></span>
                <span th:if="${post.deadline}">Deadline: <span class="text-gray-600" th:text="${post.deadline}"></span></span>
                <span>Applications: <span class="text-gray-600" th:text="${post.applications != null ? post.applications.size() : 0}"></span></span>
            </div>

            <!-- Action buttons -->
            <div class="flex flex-wrap gap-2 text-xs">
                <a th:href="@{/coordinator/posts/{id}/applications(id=${post.id})}"
                   class="border border-gray-200 text-gray-600 hover:bg-gray-50 px-3 py-1.5 rounded-lg transition">
                    View applications
                </a>
                <a th:href="@{/coordinator/posts/{id}/export(id=${post.id})}"
                   class="border border-gray-200 text-gray-600 hover:bg-gray-50 px-3 py-1.5 rounded-lg transition">
                    Export CSV
                </a>
                <a th:href="@{/coordinator/edit-post/{id}(id=${post.id})}"
                   class="border border-blue-200 text-blue-600 hover:bg-blue-50 px-3 py-1.5 rounded-lg transition">
                    Edit post
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
