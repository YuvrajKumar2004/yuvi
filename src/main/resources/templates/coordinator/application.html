<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Applications | NITA Placement</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
        <a th:href="@{/coordinator/dashboard}" class="text-gray-500 hover:text-gray-700 text-sm">&larr; Back to posts</a>
    </div>
    <div class="flex items-center gap-3 text-sm">
        <a th:href="@{/coordinator/posts/{id}/export(id=${postId})}"
           class="bg-green-600 hover:bg-green-700 text-white text-xs font-medium px-3 py-1.5 rounded-lg">
            Export CSV
        </a>
        <form th:action="@{/logout}" method="post" class="inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="text-gray-500 hover:text-red-600 text-xs border border-gray-200 px-3 py-1 rounded">Logout</button>
        </form>
    </div>
</nav>

<div class="max-w-6xl mx-auto px-4 py-6">
    <div th:if="${success}" class="bg-green-50 border border-green-200 text-green-800 text-sm rounded px-4 py-3 mb-4" th:text="${success}"></div>

    <h1 class="text-lg font-semibold text-gray-800 mb-6">
        Applications
        <span class="text-gray-400 font-normal text-sm ml-2" th:text="'(' + ${applications.size()} + ' total)'"></span>
    </h1>

    <div th:if="${applications.isEmpty()}" class="bg-white rounded-xl border border-gray-200 p-10 text-center text-sm text-gray-400">
        No applications yet for this opportunity.
    </div>

    <div class="space-y-4">
        <div th:each="app : ${applications}" class="bg-white rounded-xl border border-gray-200 p-5">
            <div class="flex items-start justify-between mb-4">
                <div>
                    <div class="font-semibold text-gray-800" th:text="${app.student.name ?: app.student.enrollmentNo}"></div>
                    <div class="text-xs text-gray-400 mt-0.5">
                        <span th:text="${app.student.enrollmentNo}"></span>
                        <span class="mx-1">&middot;</span>
                        <span th:text="${app.student.branch}"></span>
                        <span class="mx-1">&middot;</span>
                        CV: <span th:text="${app.selectedCv}"></span>
                    </div>
                </div>
                <div class="text-xs text-gray-400" th:text="${#temporals.format(app.createdAt, 'dd MMM yyyy')}"></div>
            </div>

            <div th:if="${!app.rounds.isEmpty()}" class="mb-4">
                <div class="text-xs font-medium text-gray-500 mb-2">Rounds</div>
                <div class="flex flex-wrap gap-2">
                    <div th:each="round : ${app.rounds}"
                         th:classappend="${round.status == 'SELECTED'} ? 'bg-green-50 border-green-200' : (${round.status == 'REJECTED'} ? 'bg-red-50 border-red-200' : 'bg-gray-50 border-gray-200')"
                         class="border rounded-lg px-3 py-2 text-xs">
                        <span class="font-medium text-gray-700">Round <span th:text="${round.roundNumber}"></span></span>
                        <span th:if="${round.description}" class="text-gray-400"> - <span th:text="${round.description}"></span></span>
                        <span class="font-semibold ml-2"
                              th:text="${round.status}"
                              th:classappend="${round.status == 'SELECTED'} ? 'text-green-700' : (${round.status == 'REJECTED'} ? 'text-red-600' : 'text-gray-500')"></span>
                    </div>
                </div>
            </div>

            <details class="group">
                <summary class="text-xs text-blue-600 hover:underline cursor-pointer list-none">+ Set round result</summary>
                <form th:action="@{/coordinator/posts/{postId}/rounds(postId=${postId})}" method="post"
                      class="mt-3 grid grid-cols-2 md:grid-cols-3 gap-3 text-xs">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="applicationId" th:value="${app.id}"/>

                    <div>
                        <label class="block text-gray-500 mb-1">Round #</label>
                        <input type="number" name="roundNumber" min="1" value="1" required
                               class="w-full border border-gray-200 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-1 focus:ring-blue-500"/>
                    </div>
                    <div>
                        <label class="block text-gray-500 mb-1">Description</label>
                        <input type="text" name="description" placeholder="e.g. Technical Interview"
                               class="w-full border border-gray-200 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-1 focus:ring-blue-500"/>
                    </div>
                    <div>
                        <label class="block text-gray-500 mb-1">Date</label>
                        <input type="date" name="date"
                               class="w-full border border-gray-200 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-1 focus:ring-blue-500"/>
                    </div>
                    <div>
                        <label class="block text-gray-500 mb-1">Centre / Venue</label>
                        <input type="text" name="centre" placeholder="e.g. NITA Seminar Hall"
                               class="w-full border border-gray-200 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-1 focus:ring-blue-500"/>
                    </div>
                    <div>
                        <label class="block text-gray-500 mb-1">Time</label>
                        <input type="text" name="time" placeholder="e.g. 10:00 AM"
                               class="w-full border border-gray-200 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-1 focus:ring-blue-500"/>
                    </div>
                    <div>
                        <label class="block text-gray-500 mb-1">Status</label>
                        <select name="status" required
                                class="w-full border border-gray-200 rounded-lg px-2 py-1.5 focus:outline-none focus:ring-1 focus:ring-blue-500">
                            <option value="PENDING">Pending</option>
                            <option value="SELECTED">Selected</option>
                            <option value="REJECTED">Rejected</option>
                        </select>
                    </div>
                    <div class="md:col-span-3 flex justify-end">
                        <button type="submit"
                                class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-4 py-1.5 rounded-lg transition text-xs">
                            Save round
                        </button>
                    </div>
                </form>
            </details>
        </div>
    </div>
</div>
</body>
</html>
