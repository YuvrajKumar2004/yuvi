<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle != null ? pageTitle + ' | NITA Placement' : 'NITA Placement Portal'}">NITA Placement Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [x-cloak] { display: none !important; }
        .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: 600; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Navbar -->
<nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between shadow-sm">
    <div class="flex items-center gap-3">
        <span class="text-blue-700 font-bold text-lg">NITA</span>
        <span class="text-gray-500 text-sm">Placement Portal</span>
    </div>
    <div class="flex items-center gap-4 text-sm">
        <span class="text-gray-600" sec:authentication="name">user</span>
        <span class="bg-blue-50 text-blue-700 px-2 py-1 rounded text-xs font-medium"
              sec:authorize="hasRole('STUDENT')">Student</span>
        <span class="bg-green-50 text-green-700 px-2 py-1 rounded text-xs font-medium"
              sec:authorize="hasRole('COORDINATOR')">Coordinator</span>
        <span class="bg-purple-50 text-purple-700 px-2 py-1 rounded text-xs font-medium"
              sec:authorize="hasRole('CCD_ADMIN')">CCD Admin</span>
        <span class="bg-amber-50 text-amber-700 px-2 py-1 rounded text-xs font-medium"
              sec:authorize="hasRole('CCD_MEMBER')">CCD Member</span>
        <form th:action="@{/logout}" method="post" class="inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit"
                    class="text-gray-500 hover:text-red-600 transition text-xs border border-gray-200 px-3 py-1 rounded">
                Logout
            </button>
        </form>
    </div>
</nav>

<!-- Flash messages -->
<div class="max-w-6xl mx-auto mt-4 px-4">
    <div th:if="${success}"
         class="bg-green-50 border border-green-200 text-green-800 text-sm rounded px-4 py-3 mb-4"
         th:text="${success}"></div>
    <div th:if="${error}"
         class="bg-red-50 border border-red-200 text-red-800 text-sm rounded px-4 py-3 mb-4"
         th:text="${error}"></div>
</div>

<!-- Page content injected by each template -->
<div th:fragment="content"><!-- override this --></div>

</body>
</html>
