<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Add Student | NITA Placement</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
        <a th:href="@{/ccd/dashboard}" class="text-gray-500 hover:text-gray-700 text-sm">← Dashboard</a>
        <span class="text-gray-300">|</span>
        <span class="text-sm font-medium text-gray-700">Add student</span>
    </div>
    <form th:action="@{/logout}" method="post" class="inline">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="text-gray-500 hover:text-red-600 text-xs border border-gray-200 px-3 py-1 rounded">Logout</button>
    </form>
</nav>

<div class="max-w-2xl mx-auto px-4 py-6">
    <div th:if="${success}" class="bg-green-50 border border-green-200 text-green-800 text-sm rounded px-4 py-3 mb-5" th:text="${success}"></div>

    <div class="bg-white rounded-xl border border-gray-200 p-6">
        <h2 class="text-sm font-semibold text-gray-700 mb-1">Add / update single student</h2>
        <p class="text-xs text-gray-400 mb-5">Uses enrollment as unique key — updates existing student if enrollment already exists.</p>

        <form th:action="@{/ccd/admin/students/add}" method="post" class="space-y-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="grid grid-cols-2 gap-4">
                <div><label class="block text-xs text-gray-500 mb-1">Login ID *</label>
                    <input type="text" name="loginId" required
                           class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/></div>
                <div><label class="block text-xs text-gray-500 mb-1">Password *</label>
                    <input type="password" name="password" required
                           class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/></div>
                <div><label class="block text-xs text-gray-500 mb-1">Enrollment * (unique)</label>
                    <input type="text" name="enrollment" required
                           class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/></div>
                <div><label class="block text-xs text-gray-500 mb-1">Branch *</label>
                    <input type="text" name="branch" required
                           class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/></div>
                <div><label class="block text-xs text-gray-500 mb-1">Name</label>
                    <input type="text" name="name"
                           class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/></div>
                <div><label class="block text-xs text-gray-500 mb-1">Email</label>
                    <input type="email" name="email"
                           class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/></div>
                <div><label class="block text-xs text-gray-500 mb-1">Mobile</label>
                    <input type="text" name="mobile"
                           class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/></div>
                <div><label class="block text-xs text-gray-500 mb-1">CGPA</label>
                    <input type="number" step="0.01" name="cgpa"
                           class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/></div>
                <div><label class="block text-xs text-gray-500 mb-1">X %</label>
                    <input type="number" step="0.01" name="xPercentage"
                           class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/></div>
                <div><label class="block text-xs text-gray-500 mb-1">XII %</label>
                    <input type="number" step="0.01" name="xiiPercentage"
                           class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/></div>
            </div>

            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition text-sm">
                Save student
            </button>
        </form>
    </div>
</div>
</body>
</html>
