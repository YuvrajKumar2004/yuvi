<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Manage Users | NITA Placement</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
        <a th:href="@{/ccd/dashboard}" class="text-gray-500 hover:text-gray-700 text-sm">← Dashboard</a>
        <span class="text-gray-300">|</span>
        <span class="text-sm font-medium text-gray-700">Manage users</span>
    </div>
    <form th:action="@{/logout}" method="post" class="inline">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="text-gray-500 hover:text-red-600 text-xs border border-gray-200 px-3 py-1 rounded">Logout</button>
    </form>
</nav>

<div class="max-w-xl mx-auto px-4 py-8">

    <div th:if="${success}" class="bg-green-50 border border-green-200 text-green-800 text-sm rounded px-4 py-3 mb-5" th:text="${success}"></div>

    <div class="bg-white rounded-xl border border-gray-200 p-6">
        <h2 class="text-sm font-semibold text-gray-700 mb-1">Create or update user</h2>
        <p class="text-xs text-gray-400 mb-5">If a user with this Login ID already exists, their password and role will be updated.</p>

        <form th:action="@{/ccd/admin/users}" method="post" class="space-y-4">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Login ID</label>
                <input type="text" name="loginId" required
                       class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Password</label>
                <input type="password" name="password" required
                       class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Role</label>
                <select name="role" required
                        class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="COORDINATOR">Coordinator</option>
                    <option value="CCD_MEMBER">CCD Member</option>
                </select>
            </div>
            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-lg transition text-sm">
                Save user
            </button>
        </form>
    </div>
</div>
</body>
</html>
