<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit Student | NITA Placement</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
        <a th:href="@{/ccd/admin/students}" class="text-gray-500 hover:text-gray-700 text-sm">&larr; Students</a>
        <span class="text-gray-300">|</span>
        <span class="text-sm font-medium text-gray-700" th:text="${studentDisplayName}">Edit student</span>
    </div>
    <form th:action="@{/logout}" method="post" class="inline">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="text-gray-500 hover:text-red-600 text-xs border border-gray-200 px-3 py-1 rounded">Logout</button>
    </form>
</nav>

<div class="max-w-3xl mx-auto px-4 py-6">
    <div th:if="${success}" class="bg-green-50 border border-green-200 text-green-800 text-sm rounded px-4 py-3 mb-5" th:text="${success}"></div>

    <form th:action="@{/ccd/admin/students/{uid}/edit(uid=${student.user.id})}" method="post" class="space-y-6">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="bg-white rounded-xl border border-gray-200 p-6">
            <h2 class="text-sm font-semibold text-gray-700 mb-4">Personal information</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div><label class="block text-xs text-gray-500 mb-1">Name</label>
                    <input type="text" name="name" th:value="${student.name}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/></div>
                <div><label class="block text-xs text-gray-500 mb-1">Email</label>
                    <input type="email" name="email" th:value="${student.email}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/></div>
                <div><label class="block text-xs text-gray-500 mb-1">Mobile</label>
                    <input type="text" name="mobile" th:value="${student.mobile}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/></div>
                <div><label class="block text-xs text-gray-500 mb-1">Branch</label>
                    <input type="text" name="branch" th:value="${student.branch}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/></div>
                <div><label class="block text-xs text-gray-500 mb-1">Placement status</label>
                    <select name="placementStatus" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
                        <option value="UNPLACED" th:selected="${student.placementStatus != null and student.placementStatus.name() == 'UNPLACED'}">Unplaced</option>
                        <option value="NORMAL_PLACED" th:selected="${student.placementStatus != null and student.placementStatus.name() == 'NORMAL_PLACED'}">Normal placed</option>
                        <option value="STANDARD_PLACED" th:selected="${student.placementStatus != null and student.placementStatus.name() == 'STANDARD_PLACED'}">Standard placed</option>
                        <option value="DREAM_PLACED" th:selected="${student.placementStatus != null and student.placementStatus.name() == 'DREAM_PLACED'}">Dream placed</option>
                    </select></div>
            </div>
        </div>

        <div class="bg-white rounded-xl border border-gray-200 p-6">
            <h2 class="text-sm font-semibold text-gray-700 mb-4">Academic records</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div><label class="block text-xs text-gray-500 mb-1">CGPA</label>
                    <input type="number" step="0.01" name="cgpa" th:value="${student.cgpa}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/></div>
                <div><label class="block text-xs text-gray-500 mb-1">X %</label>
                    <input type="number" step="0.01" name="xPercentage" th:value="${student.xPercentage}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/></div>
                <div><label class="block text-xs text-gray-500 mb-1">XII %</label>
                    <input type="number" step="0.01" name="xiiPercentage" th:value="${student.xiiPercentage}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/></div>
                <div><label class="block text-xs text-gray-500 mb-1">Active backlogs</label>
                    <input type="number" name="activeBacklogs" th:value="${student.activeBacklogs}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/></div>
                <div><label class="block text-xs text-gray-500 mb-1">Dead backlogs</label>
                    <input type="number" name="deadBacklogs" th:value="${student.deadBacklogs}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/></div>

                <div><label class="block text-xs text-gray-500 mb-1">SGPA S1</label><input type="number" step="0.01" name="sgpaSem1" th:value="${student.sgpaSem1}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/></div>
                <div><label class="block text-xs text-gray-500 mb-1">SGPA S2</label><input type="number" step="0.01" name="sgpaSem2" th:value="${student.sgpaSem2}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/></div>
                <div><label class="block text-xs text-gray-500 mb-1">SGPA S3</label><input type="number" step="0.01" name="sgpaSem3" th:value="${student.sgpaSem3}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/></div>
                <div><label class="block text-xs text-gray-500 mb-1">SGPA S4</label><input type="number" step="0.01" name="sgpaSem4" th:value="${student.sgpaSem4}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/></div>
                <div><label class="block text-xs text-gray-500 mb-1">SGPA S5</label><input type="number" step="0.01" name="sgpaSem5" th:value="${student.sgpaSem5}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/></div>
                <div><label class="block text-xs text-gray-500 mb-1">SGPA S6</label><input type="number" step="0.01" name="sgpaSem6" th:value="${student.sgpaSem6}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/></div>
                <div><label class="block text-xs text-gray-500 mb-1">SGPA S7</label><input type="number" step="0.01" name="sgpaSem7" th:value="${student.sgpaSem7}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/></div>
                <div><label class="block text-xs text-gray-500 mb-1">SGPA S8</label><input type="number" step="0.01" name="sgpaSem8" th:value="${student.sgpaSem8}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/></div>
            </div>
        </div>

        <div class="bg-white rounded-xl border border-gray-200 p-6">
            <h2 class="text-sm font-semibold text-gray-700 mb-4">CV links</h2>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs text-gray-500 mb-1">CV 1</label>
                    <input type="url" name="cv1Url1" th:value="${student.cv1Url1}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">CV 2</label>
                    <input type="url" name="cv2Url1" th:value="${student.cv2Url1}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/>
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1">CV 3</label>
                    <input type="url" name="cv3Url1" th:value="${student.cv3Url1}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/>
                </div>
            </div>
        </div>

        <div class="flex gap-3 justify-end">
            <a th:href="@{/ccd/admin/students}" class="border border-gray-200 text-gray-600 px-5 py-2 rounded-lg text-sm hover:bg-gray-50">Cancel</a>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-6 py-2 rounded-lg text-sm transition">Save changes</button>
        </div>
    </form>
</div>
</body>
</html>
