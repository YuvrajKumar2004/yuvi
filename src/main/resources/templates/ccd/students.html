<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Manage Students | NITA Placement</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
        <a th:href="@{/ccd/dashboard}" class="text-gray-500 hover:text-gray-700 text-sm">&larr; Dashboard</a>
        <span class="text-gray-300">|</span>
        <span class="text-sm font-medium text-gray-700">Manage students</span>
    </div>
    <form th:action="@{/logout}" method="post" class="inline">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="text-gray-500 hover:text-red-600 text-xs border border-gray-200 px-3 py-1 rounded">Logout</button>
    </form>
</nav>

<div class="max-w-4xl mx-auto px-4 py-6">
    <div th:if="${success}" class="bg-green-50 border border-green-200 text-green-800 text-sm rounded px-4 py-3 mb-4" th:text="${success}"></div>
    <div th:if="${searchError}" class="bg-red-50 border border-red-200 text-red-800 text-sm rounded px-4 py-3 mb-4" th:text="${searchError}"></div>

    <div class="bg-white rounded-xl border border-gray-200 p-6 mb-6">
        <h2 class="text-sm font-semibold text-gray-700 mb-4">Search student by enrollment</h2>
        <form th:action="@{/ccd/admin/students}" method="get" class="flex gap-3">
            <input type="text" name="enrollment" placeholder="e.g. 23CS001" required
                   class="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
            <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition">
                Search
            </button>
        </form>
    </div>

    <div th:if="${foundStudent}" class="bg-white rounded-xl border border-gray-200 p-6 mb-6">
        <div class="flex items-start justify-between mb-4">
            <div>
                <div class="font-semibold text-gray-800" th:text="${foundStudent.name ?: foundStudent.enrollmentNo}"></div>
                <div class="text-xs text-gray-400 mt-0.5"
                     th:text="${foundStudent.enrollmentNo + ' | ' + (foundStudent.branch ?: '-') + ' | ' + (foundStudent.email ?: '-')}"></div>
            </div>
            <span th:text="${foundStudent.placementStatus}" class="text-xs px-2 py-0.5 rounded-full font-medium bg-gray-100 text-gray-600"></span>
        </div>

        <div class="flex gap-3 flex-wrap text-xs">
            <a th:href="@{/ccd/admin/students/{uid}/edit(uid=${foundStudent.user.id})}"
               class="border border-blue-200 text-blue-600 hover:bg-blue-50 px-3 py-1.5 rounded-lg transition">
                Edit profile
            </a>

            <form th:action="@{/ccd/admin/students/lock}" method="post" class="inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="enrollment" th:value="${foundStudent.enrollmentNo}"/>
                <input type="hidden" name="locked" th:value="${!foundStudent.user.locked}"/>
                <button type="submit"
                        th:text="${foundStudent.user.locked} ? 'Unlock student' : 'Lock student'"
                        th:classappend="${foundStudent.user.locked} ? 'border-green-200 text-green-700 hover:bg-green-50' : 'border-red-200 text-red-600 hover:bg-red-50'"
                        class="border px-3 py-1.5 rounded-lg transition"></button>
            </form>
        </div>
    </div>

    <div class="bg-white rounded-xl border border-gray-200 p-6">
        <h2 class="text-sm font-semibold text-gray-700 mb-4">Lock / Unlock by enrollment</h2>
        <form th:action="@{/ccd/admin/students/lock}" method="post" class="flex gap-3 items-end flex-wrap">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="flex-1 min-w-40">
                <label class="block text-xs text-gray-500 mb-1">Enrollment</label>
                <input type="text" name="enrollment" placeholder="23CS001" required
                       class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"/>
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1">Action</label>
                <select name="locked" class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500">
                    <option value="true">Lock</option>
                    <option value="false">Unlock</option>
                </select>
            </div>
            <button type="submit" class="bg-gray-700 hover:bg-gray-800 text-white text-sm font-medium px-4 py-2 rounded-lg transition">
                Update
            </button>
        </form>
    </div>
</div>
</body>
</html>
