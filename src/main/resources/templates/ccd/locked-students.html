<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Locked Students | NITA Placement</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
        <a th:href="@{/ccd/dashboard}" class="text-gray-500 hover:text-gray-700 text-sm">← Dashboard</a>
        <span class="text-gray-300">|</span>
        <span class="text-sm font-medium text-gray-700">Locked students</span>
    </div>
    <form th:action="@{/logout}" method="post" class="inline">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="text-gray-500 hover:text-red-600 text-xs border border-gray-200 px-3 py-1 rounded">Logout</button>
    </form>
</nav>

<div class="max-w-4xl mx-auto px-4 py-6">

    <div th:if="${success}" class="bg-green-50 border border-green-200 text-green-800 text-sm rounded px-4 py-3 mb-4" th:text="${success}"></div>

    <h1 class="text-lg font-semibold text-gray-800 mb-6">
        Locked students
        <span class="text-gray-400 font-normal text-sm ml-2"
              th:text="'(' + ${lockedStudents.size()} + ')'"></span>
    </h1>

    <div th:if="${lockedStudents.isEmpty()}"
         class="bg-white rounded-xl border border-gray-200 p-10 text-center text-sm text-gray-400">
        No students are currently locked.
    </div>

    <div class="bg-white rounded-xl border border-gray-200 overflow-hidden" th:if="${!lockedStudents.isEmpty()}">
        <table class="w-full text-sm">
            <thead>
            <tr class="bg-gray-50 text-xs text-gray-500 border-b border-gray-100">
                <th class="text-left px-5 py-3 font-medium">Enrollment</th>
                <th class="text-left px-5 py-3 font-medium">Name</th>
                <th class="text-left px-5 py-3 font-medium">Branch</th>
                <th class="text-left px-5 py-3 font-medium">Email</th>
                <th class="px-5 py-3 font-medium">Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="s : ${lockedStudents}"
                class="border-t border-gray-100 hover:bg-gray-50">
                <td class="px-5 py-3 font-mono text-xs text-gray-700" th:text="${s.enrollment}"></td>
                <td class="px-5 py-3 text-gray-700" th:text="${s.name ?: '—'}"></td>
                <td class="px-5 py-3 text-gray-500" th:text="${s.branch ?: '—'}"></td>
                <td class="px-5 py-3 text-gray-500" th:text="${s.email ?: '—'}"></td>
                <td class="px-5 py-3 text-center">
                    <form th:action="@{/ccd/admin/students/lock}" method="post" class="inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="enrollment" th:value="${s.enrollment}"/>
                        <input type="hidden" name="locked" value="false"/>
                        <button type="submit"
                                class="text-xs border border-green-200 text-green-700 hover:bg-green-50 px-3 py-1 rounded-lg transition">
                            Unlock
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
